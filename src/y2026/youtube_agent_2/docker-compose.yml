name: youtube-learning-organizer

x-service-defaults: &service-defaults
  build:
    context: ../../..
    dockerfile: src/y2026/youtube_agent_2/deployment/docker/Dockerfile
  restart: unless-stopped
  env_file:
    - path: backend/.env
      required: false
  environment:
    INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-microservice-token-change-me}
    FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}

services:
  gateway:
    <<: *service-defaults
    command: uvicorn src.y2026.youtube_agent_2.backend.services.gateway.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-microservice-token-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GATEWAY_YOUTUBE_SERVICE_URL: http://youtube-service:8002
      GATEWAY_PLANS_SERVICE_URL: http://plans-service:8003
    depends_on:
      youtube-service:
        condition: service_healthy
      plans-service:
        condition: service_healthy

  youtube-service:
    <<: *service-defaults
    command: uvicorn src.y2026.youtube_agent_2.backend.services.youtube.main:app --host 0.0.0.0 --port 8002
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-microservice-token-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_PATH: /data/youtube.sqlite3
    volumes:
      - youtube-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  plans-service:
    <<: *service-defaults
    command: uvicorn src.y2026.youtube_agent_2.backend.services.plans.main:app --host 0.0.0.0 --port 8003
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-microservice-token-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_PATH: /data/plans.sqlite3
      YOUTUBE_SERVICE_URL: http://youtube-service:8002
    volumes:
      - plans-data:/data
    depends_on:
      youtube-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  youtube-data:
  plans-data:
