{{- if not .Values.internalService.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "youtube-agent.internalSecretName" . }}
  labels:
    {{- include "youtube-agent.labels" (dict "root" . "component" "platform") | nindent 4 }}
type: Opaque
data:
  INTERNAL_SERVICE_TOKEN: {{ required "internalService.token is required when internalService.existingSecret is empty" .Values.internalService.token | toString | b64enc | quote }}
{{- end }}
{{- if and .Values.secrets.youtube.create (not .Values.secrets.youtube.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "youtube-agent.youtubeSecretName" . }}
  labels:
    {{- include "youtube-agent.labels" (dict "root" . "component" "youtube") | nindent 4 }}
type: Opaque
data:
  GOOGLE_CLIENT_ID: {{ required "secrets.youtube.googleClientId is required" .Values.secrets.youtube.googleClientId | toString | b64enc | quote }}
  GOOGLE_CLIENT_SECRET: {{ required "secrets.youtube.googleClientSecret is required" .Values.secrets.youtube.googleClientSecret | toString | b64enc | quote }}
  YOUTUBE_TOKEN_ENCRYPTION_KEY: {{ required "secrets.youtube.tokenEncryptionKey is required" .Values.secrets.youtube.tokenEncryptionKey | toString | b64enc | quote }}
  YOUTUBE_OAUTH_STATE_SECRET: {{ required "secrets.youtube.oauthStateSecret is required" .Values.secrets.youtube.oauthStateSecret | toString | b64enc | quote }}
  FIREBASE_SERVICE_ACCOUNT_JSON: {{ .Values.secrets.youtube.firebaseServiceAccountJson | toString | b64enc | quote }}
{{- end }}
{{- if and .Values.secrets.plans.create (not .Values.secrets.plans.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "youtube-agent.plansSecretName" . }}
  labels:
    {{- include "youtube-agent.labels" (dict "root" . "component" "plans") | nindent 4 }}
type: Opaque
data:
  FIREBASE_SERVICE_ACCOUNT_JSON: {{ required "secrets.plans.firebaseServiceAccountJson is required" .Values.secrets.plans.firebaseServiceAccountJson | toString | b64enc | quote }}
{{- end }}
