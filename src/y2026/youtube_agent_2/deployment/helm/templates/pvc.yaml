{{- if and .Values.youtube.persistence.enabled (not .Values.youtube.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "youtube-agent.fullname" . }}-youtube-data
  {{- if .Values.youtube.persistence.retain }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
  labels:
    {{- include "youtube-agent.labels" (dict "root" . "component" "youtube") | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.youtube.persistence.accessModes | nindent 4 }}
  {{- if .Values.youtube.persistence.storageClass }}
  storageClassName: {{ .Values.youtube.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.youtube.persistence.size }}
{{- end }}
