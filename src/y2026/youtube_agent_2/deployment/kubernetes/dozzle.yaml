apiVersion: v1
kind: ServiceAccount
metadata:
  name: dozzle
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: youtube-agent-dozzle
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: youtube-agent-dozzle
subjects:
  - kind: ServiceAccount
    name: dozzle
    namespace: youtube-agent
roleRef:
  kind: ClusterRole
  name: youtube-agent-dozzle
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dozzle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dozzle
  template:
    metadata:
      labels:
        app: dozzle
    spec:
      serviceAccountName: dozzle
      containers:
        - name: dozzle
          image: amir20/dozzle:v10.6.11
          imagePullPolicy: IfNotPresent
          env:
            - name: DOZZLE_MODE
              value: k8s
            - name: DOZZLE_NAMESPACE
              value: youtube-agent
            - name: DOZZLE_ENABLE_SHELL
              value: "false"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dozzle
spec:
  selector:
    app: dozzle
  ports:
    - name: http
      port: 8080
      targetPort: http
