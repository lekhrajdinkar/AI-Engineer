apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: youtube-agent
resources:
  - namespace.yaml
  - configmap.yaml
  - storage.yaml
  - gateway.yaml
  - youtube.yaml
  - plans.yaml
  - ollama.yaml
  - dozzle.yaml
secretGenerator:
  - name: youtube-agent-internal
    literals:
      - INTERNAL_SERVICE_TOKEN=local-kubernetes-token-change-me
generatorOptions:
  disableNameSuffixHash: true
